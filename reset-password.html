<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="reset-password-style.css">
</head>

<body>

    <div class="reset-card">
        <h1>Reset Password</h1>

        <form>
            <div class="input-wrapper">
                <label for="id-number">Please Enter your ID Number</label>
                <div class="input-field">
                    <i class="fa-solid fa-user field-icon"></i>
                    <input type="text" id="id-number" placeholder="ID Number" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="new-password">Input your new password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="new-password" placeholder="Password" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="confirm-password">Confirm Password</label>
                <div class="input-field">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                </div>
            </div>

            <div class="button-wrapper">
                <button type="submit" class="btn-continue">
                    Continue <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        document.querySelector('.btn-continue-class-or-id').addEventListener('click', async (e) => {
            e.preventDefault(); // Prevents page from reloading automatically

            // 1. Gather values from your input fields (replace IDs/classes with your actual ones)
            const fname = document.getElementById('first-name-input-id').value;
            const lname = document.getElementById('last-name-input-id').value;
            const email = document.getElementById('email-input-id').value;
            const password = document.getElementById('password-input-id').value;
            const confirmPassword = document.getElementById('confirm-password-input-id').value;

            // Quick frontend validation match check
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // 2. Build the payload matching the keys your backend expects
            const userData = {
                username: email, // If you are using email as username
                password: password,
                fname: fname,
                lname: lname,
                gender: 'male' // Or extract from a gender selection field if you add one
            };

            try {
                // 3. Send the data to your Node.js server
                const response = await fetch('http://localhost:3006/usersave', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alert('Registration successful!');
                    window.location.href = 'login.html'; // Redirect to login screen
                } else {
                    alert('Failed to save information: ' + (result.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Network Error:', error);
                alert('Could not connect to the backend server.');
            }
        });
    </script>

</body>

</html>
